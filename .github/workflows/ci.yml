name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # `npm install` (not `npm ci`): @vercel/otel pulls some @opentelemetry/* packages in as
        # required peer deps, and npm's auto-peer-install is represented non-deterministically in the
        # lockfile across environments — which makes the strict `npm ci` sync check flaky. `install`
        # resolves them cleanly; --no-audit/--no-fund keep the log quiet.
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        # The DB client is lazy, but env is validated on first access — give the build a dummy
        # DATABASE_URL so any static-generation path that reads env doesn't fail. No connection is made.
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
        run: npm run build
